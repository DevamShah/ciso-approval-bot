<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#0f3460" stroke-width="2"/>
  <!-- Shield shape -->
  <path d="M100 30 L150 55 L150 110 Q150 150 100 175 Q50 150 50 110 L50 55 Z"
        fill="url(#shield)" opacity="0.9" stroke="#e94560" stroke-width="1.5"/>
  <!-- AI brain icon inside shield -->
  <circle cx="100" cy="95" r="25" fill="none" stroke="#e94560" stroke-width="2" opacity="0.8"/>
  <circle cx="90" cy="88" r="3" fill="#e94560"/>
  <circle cx="110" cy="88" r="3" fill="#e94560"/>
  <circle cx="100" cy="102" r="3" fill="#e94560"/>
  <circle cx="85" cy="100" r="3" fill="#e94560"/>
  <circle cx="115" cy="100" r="3" fill="#e94560"/>
  <!-- Neural connections -->
  <line x1="90" y1="88" x2="110" y2="88" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="90" y1="88" x2="100" y2="102" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="110" y1="88" x2="100" y2="102" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="85" y1="100" x2="100" y2="102" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="115" y1="100" x2="100" y2="102" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="85" y1="100" x2="90" y2="88" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="115" y1="100" x2="110" y2="88" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <!-- Checkmark -->
  <path d="M88 130 L97 140 L115 118" fill="none" stroke="#4ecca3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
